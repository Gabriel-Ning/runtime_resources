# One pose route for the single-arm FR3 controller pipeline.
execution_manager:
  ros__parameters:
    joint_names: "fr3_joint1,fr3_joint2,fr3_joint3,fr3_joint4,fr3_joint5,fr3_joint6,fr3_joint7"

    source_namespace: "/action_sources"
    sources: >-
      {"marker":{"priority":100,
                 "inactive_timeout_s":0.5,
                 "pose_contracts":["pose_target"]}}

    pose_output_topic: "/position_controller/pose_reference"
    status_topic: "/execution_manager/status"

    status_rate_hz: 2.0
    stale_timeout_s: 0.5
    max_future_s: 0.1
