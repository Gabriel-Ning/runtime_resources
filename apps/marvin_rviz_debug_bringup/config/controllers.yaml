# ros2_control controller_manager profile for the Marvin bimanual RViz debug
# pipeline. Fake hardware only (mock_components/GenericSystem); no SDK, no
# real motion. Both arms are loaded: left (Joint1_L..Joint7_L) and right
# (Joint1_R..Joint7_R), each with its own TSKPC instance.
controller_manager:
  ros__parameters:
    update_rate: 500

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    left_task_space_kinematic_position_controller:
      type: manipulation_position_controllers/TaskSpaceKinematicPositionController

    right_task_space_kinematic_position_controller:
      type: manipulation_position_controllers/TaskSpaceKinematicPositionController

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 500.0

left_task_space_kinematic_position_controller:
  ros__parameters:
    joints:
      - Joint1_L
      - Joint2_L
      - Joint3_L
      - Joint4_L
      - Joint5_L
      - Joint6_L
      - Joint7_L

    base_frame: Base_L
    tip_frame: flange_L

    # Matches the em_left instance's pose_output_topic (see
    # config/execution_manager_left.yaml).
    pose_topic: /position_controller/left_pose_reference

    stale_timeout_s: 0.2
    max_joint_velocity_rad_s: 1.0
    max_linear_velocity_m_s: 0.5
    max_angular_velocity_rad_s: 1.0
    max_command_tracking_error_rad: 0.35
    status_rate_hz: 10.0

    # osqp mirrors pinocchio_dls's gain semantics (see osqp_solver.hpp) --
    # do not reuse the much higher placo gains here, they would
    # overshoot/oscillate in the direct QP formulation.
    solver:
      backend: osqp
      position_gain: 4.0
      orientation_gain: 1.0
      damping: 0.05
      posture_weight: 1.0e-3
      max_iterations: 1

    # Native M6 joint1..joint7 position limits, copied from
    # marvin_description/config/joint_limits.yaml (also the URDF's source of
    # truth via xacro). TaskSpaceKinematicPositionController does not read
    # URDF <limit> tags itself -- it only clamps to lower_limits/upper_limits
    # if explicitly given here, otherwise it defaults to +-inf (unlimited).
    lower_limits: [-2.9671, -2.0944, -2.9671, -2.5307, -2.9671, -1.0472, -1.5708]
    upper_limits: [ 2.9671,  2.0944,  2.9671,  1.0472,  2.9671,  1.0472,  1.5708]

right_task_space_kinematic_position_controller:
  ros__parameters:
    joints:
      - Joint1_R
      - Joint2_R
      - Joint3_R
      - Joint4_R
      - Joint5_R
      - Joint6_R
      - Joint7_R

    base_frame: Base_R
    tip_frame: flange_R

    # Matches the em_right instance's pose_output_topic (see
    # config/execution_manager_right.yaml).
    pose_topic: /position_controller/right_pose_reference

    stale_timeout_s: 0.2
    max_joint_velocity_rad_s: 1.0
    max_linear_velocity_m_s: 0.5
    max_angular_velocity_rad_s: 1.0
    max_command_tracking_error_rad: 0.35
    status_rate_hz: 10.0

    solver:
      backend: osqp
      position_gain: 4.0
      orientation_gain: 1.0
      damping: 0.05
      posture_weight: 1.0e-3
      max_iterations: 1

    # Same native per-joint limits as the left arm above, mirrored L/R.
    lower_limits: [-2.9671, -2.0944, -2.9671, -2.5307, -2.9671, -1.0472, -1.5708]
    upper_limits: [ 2.9671,  2.0944,  2.9671,  1.0472,  2.9671,  1.0472,  1.5708]
