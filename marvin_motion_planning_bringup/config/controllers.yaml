controller_manager:
  ros__parameters:
    update_rate: 500
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    left_arm_jspc:
      type: manipulation_position_controllers/JointSpacePositionController
    right_arm_jspc:
      type: manipulation_position_controllers/JointSpacePositionController
    left_arm_jtc:
      type: joint_trajectory_controller/JointTrajectoryController
    right_arm_jtc:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 500.0

left_arm_jspc:
  ros__parameters:
    joints: [Joint1_L, Joint2_L, Joint3_L, Joint4_L, Joint5_L, Joint6_L, Joint7_L]
    input_topic: /left_arm_jspc/joint_reference
    reference_behavior:
      mode: ruckig
      max_points: 1
      stale_timeout_s: 0.2
      max_velocity_rad_s: 2.0
      max_acceleration_rad_s2: 8.0
      max_jerk_rad_s3: 20.0
      ruckig_control_cycle_s: 0.002
      ema_alpha: 0.7
    lower_limits: [-2.9671, -2.0944, -2.9671, -2.5307, -2.9671, -1.0472, -1.5708]
    upper_limits: [2.9671, 2.0944, 2.9671, 1.0472, 2.9671, 1.0472, 1.5708]

right_arm_jspc:
  ros__parameters:
    joints: [Joint1_R, Joint2_R, Joint3_R, Joint4_R, Joint5_R, Joint6_R, Joint7_R]
    input_topic: /right_arm_jspc/joint_reference
    reference_behavior:
      mode: ruckig
      max_points: 1
      stale_timeout_s: 0.2
      max_velocity_rad_s: 2.0
      max_acceleration_rad_s2: 8.0
      max_jerk_rad_s3: 20.0
      ruckig_control_cycle_s: 0.002
      ema_alpha: 0.7
    lower_limits: [-2.9671, -2.0944, -2.9671, -2.5307, -2.9671, -1.0472, -1.5708]
    upper_limits: [2.9671, 2.0944, 2.9671, 1.0472, 2.9671, 1.0472, 1.5708]

left_arm_jtc:
  ros__parameters:
    joints: [Joint1_L, Joint2_L, Joint3_L, Joint4_L, Joint5_L, Joint6_L, Joint7_L]
    command_interfaces: [position]
    state_interfaces: [position, velocity]
    allow_partial_joints_goal: false
    action_monitor_rate: 20.0

right_arm_jtc:
  ros__parameters:
    joints: [Joint1_R, Joint2_R, Joint3_R, Joint4_R, Joint5_R, Joint6_R, Joint7_R]
    command_interfaces: [position]
    state_interfaces: [position, velocity]
    allow_partial_joints_goal: false
    action_monitor_rate: 20.0
