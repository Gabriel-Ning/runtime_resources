# Execution manager profile for Marvin's LEFT arm (RViz debug pipeline).
#
# Single source ("marker_left") on the pose_target contract. Node name must
# be em_left -- see rviz_debug_bringup.launch.py, which instantiates this
# package's executable directly with name="em_left" (bypassing its own
# launch file, which hardcodes name="execution_manager" and cannot run two
# differently-named instances from one launch file).
em_left:
  ros__parameters:
    joint_names: "Joint1_L,Joint2_L,Joint3_L,Joint4_L,Joint5_L,Joint6_L,Joint7_L"

    source_namespace: "/action_sources"
    sources: >-
      {"marker_left":{"priority":100,
                  "inactive_timeout_s":0.5,
                  "pose_contracts":["pose_target"]}}

    pose_output_topic: "/position_controller/left_pose_reference"
    status_topic: "/execution_manager/left_status"

    status_rate_hz: 2.0
    stale_timeout_s: 0.5
    max_future_s: 0.1
