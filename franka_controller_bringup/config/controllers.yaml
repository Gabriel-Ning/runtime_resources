# ros2_control profile for the Physical AI Runtime FR3 position-control path.
controller_manager:
  ros__parameters:
    update_rate: 1000

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    task_space_kinematic_position_controller:
      type: manipulation_position_controllers/TaskSpaceKinematicPositionController

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 100.0

task_space_kinematic_position_controller:
  ros__parameters:
    joints:
      - fr3_joint1
      - fr3_joint2
      - fr3_joint3
      - fr3_joint4
      - fr3_joint5
      - fr3_joint6
      - fr3_joint7

    base_frame: fr3_link0
    tip_frame: fr3_link8
    pose_topic: /position_controller/pose_reference

    stale_timeout_s: 0.2
    max_joint_velocity_rad_s: 1.0
    max_linear_velocity_m_s: 0.5
    max_angular_velocity_rad_s: 1.0
    max_command_tracking_error_rad: 0.35
    status_rate_hz: 10.0

    solver:
      backend: osqp
      position_gain: 4.0
      orientation_gain: 1.0
      damping: 0.05
      posture_weight: 1.0e-3
      max_iterations: 1

    # Copied from franka_description/robots/fr3/joint_limits.yaml. TSKPC
    # clamps only against explicit controller parameters; it does not obtain
    # these limits from the URDF.
    lower_limits: [-2.9007, -1.8361, -2.9007, -3.0770, -2.8763, 0.4398, -3.0508]
    upper_limits: [ 2.9007,  1.8361,  2.9007, -0.1169,  2.8763, 4.6216,  3.0508]
