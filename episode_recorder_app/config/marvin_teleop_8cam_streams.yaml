# First production application contract for the generic recorder.
# Cameras match hik_camera/config/multi_camera_60.yaml: eight synchronized
# test_camera_1..8 streams at 640x480@60. Robot topics match
# marvin_controller_bringup. Optional input streams may be absent at start.
streams:
  - id: test_camera_1_image
    label: camera.test_camera_1.image
    role: camera_image
    topic: /cameras/test_camera_1/image_raw
    expected_type: sensor_msgs/msg/Image
    required: true
    qos: {mode: auto, depth: 10}
    time: {source_domain: header_device_or_driver}
    health:
      expected_rate_hz: 60.0
      min_rate_ratio: 0.90
      max_gap_s: 0.20
      recorder_drop_policy: fail
      duration_overrides:
        - max_duration_s: 5.0
          min_rate_ratio: 0.70
          max_gap_s: 0.30

  - id: test_camera_1_info
    label: camera.test_camera_1.info
    role: camera_info
    topic: /cameras/test_camera_1/camera_info
    expected_type: sensor_msgs/msg/CameraInfo
    required: true
    qos: {mode: auto, depth: 10}
    time: {source_domain: header_device_or_driver}
    health: {recorder_drop_policy: fail}

  - id: test_camera_1_metadata
    label: camera.test_camera_1.metadata
    role: frame_metadata
    topic: /cameras/test_camera_1/metadata
    expected_type: hik_camera_msg/msg/FrameMetadata
    required: true
    qos: {mode: auto, depth: 10}
    time: {source_domain: header_device_or_driver}
    health: {recorder_drop_policy: fail}

